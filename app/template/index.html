<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgentCommerce</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <span></span>AgentCommerce
  </div>
  <button type="button" onclick="switchTab('cart'); viewCart()" class="cart-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    Cart
    <span class="cart-count" id="cartCount">0</span>
  </button>
</header>

<!-- ── MAIN ── -->
<div class="main">

  <!-- ── HERO ── -->
  <div class="hero">
    <div class="hero-text">
      <h1>Shop<br><em>smarter,</em><br>always.</h1>
      <p>AI-powered product discovery — search by keyword, voice, or image. Compare, add to cart, and track instantly.</p>
    </div>

    <div class="hero-search">
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
          </span>
          <input id="searchInput" type="text" placeholder="Search for anything…" />
        </div>
        <button type="button" class="icon-btn" title="Voice Search" onclick="startVoiceSearch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button type="button" id="cameraToggleBtn" class="icon-btn" title="Image Search" onclick="toggleImageSearch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </button>
      </div>

      <div class="search-row">
        <input id="maxPrice" type="number" class="price-input" placeholder="Max price $" />
        <button type="button" class="search-submit" onclick="searchWebProducts()">Search →</button>
      </div>

      <!-- Image search (hidden by default, toggled via camera btn) -->
      <div id="imageSearchSection">
        <h3>Find by image</h3>
        <div id="imageDropZone" class="image-drop-zone">
          Drop an image here, or click to upload
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <div id="imagePreview"></div>
        <button type="button" class="img-search-btn" onclick="findSimilarProductsFromImage()">Find Similar Products →</button>
      </div>
    </div>
  </div><!-- /.hero -->

  <!-- ── TABS ── -->
  <div class="tabs">
    <button type="button" id="tab-products" class="tab active" onclick="switchTab('products')">Products</button>
    <button type="button" id="tab-cart"     class="tab"        onclick="switchTab('cart'); viewCart()">Cart</button>
    <button type="button" id="tab-track"    class="tab"        onclick="switchTab('track')">Track Order</button>
  </div>

  <!-- ── PRODUCTS PANEL ── -->
  <div id="panel-products" class="panel active">
    <div id="results"></div>
  </div>

  <!-- ── CART PANEL ── -->
  <div id="panel-cart" class="panel">
    <div id="cart"></div>
  </div>

  <!-- ── TRACK PANEL ── -->
  <div id="panel-track" class="panel">
    <div class="track-inner">
      <h2>Track your order</h2>
      <div class="track-row">
        <input id="orderIdInput" type="text" class="track-input" placeholder="Enter order ID…" />
        <button type="button" class="btn-action" onclick="trackOrder()">Track</button>
      </div>
      <div id="orderStatus"></div>
    </div>
  </div>

</div><!-- /.main -->

<!-- ── LOADER OVERLAY ── -->
<div id="loaderOverlay" aria-live="polite" aria-label="Loading">
  <div class="loader-box">
    <div class="loader-ring"></div>
    <p class="loader-text" id="loaderText">Searching…</p>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
