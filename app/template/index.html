<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agentic Commerce</title>

  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
  <div class="logo">⬡ AgentCommerce</div>
  <button type="button" onclick="switchTab('cart'); viewCart()" class="cart-badge-btn">
    🛒 Cart <span id="cartCount">0</span>
  </button>
</header>

<div class="main">

  <div class="hero">
    <h1>Shop Smarter</h1>

    <div class="search-bar">
      <input id="searchInput" placeholder="Search..." />
      <button type="button" onclick="startVoiceSearch()">🎤</button>
      <button type="button" id="cameraToggleBtn" onclick="toggleImageSearch()">📷</button>
      <input id="maxPrice" type="number" placeholder="Max $" />
      <button type="button" onclick="searchWebProducts()">Search</button>
    </div>
  </div>

  <div class="tabs">
    <button type="button" id="tab-products" class="tab active" onclick="switchTab('products')">Products</button>
    <button type="button" id="tab-cart" class="tab" onclick="switchTab('cart'); viewCart()">Cart</button>
    <button type="button" id="tab-track" class="tab" onclick="switchTab('track')">Track</button>
  </div>

  <div id="panel-products" class="panel active">
    <div id="imageSearchSection" class="product-card image-search-section">
      <h3>Find Similar Products from Image</h3>

      <div id="imageDropZone" class="image-drop-zone">
        Drag & drop an image here or click to upload
      </div>

      <input type="file" id="imageInput" accept="image/*" style="display: none;">
      <div id="imagePreview" style="margin-top: 15px;"></div>

      <button type="button" onclick="findSimilarProductsFromImage()" style="margin-top: 15px;">
        Find Similar Products
      </button>
    </div>

    <div id="results"></div>
  </div>

  <div id="panel-cart" class="panel">
    <div id="cart"></div>
  </div>

  <div id="panel-track" class="panel">
    <input id="orderIdInput" placeholder="Order ID">
    <button type="button" onclick="trackOrder()">Track</button>
    <div id="orderStatus"></div>
  </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
